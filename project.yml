name: CoreAIFrameworkLab
options:
  bundleIdPrefix: com.rudrank
  deploymentTarget:
    iOS: "27.0"
    macOS: "27.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  coreai-models:
    url: https://github.com/apple/coreai-models
    revision: e358c8435679c904687f8070eb95150e36e4b76d
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.1.0
schemes:
  CoreAILabMac:
    build:
      targets:
        CoreAILabMac: all
    run:
      config: Debug
      executable: CoreAILabMac
    test:
      config: Debug
      debugEnabled: false
      targets:
        - CoreAILabMacTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  CoreAILab:
    type: application
    platform: iOS
    sources:
      - path: CoreAILab
        excludes:
          - Resources
      - path: CoreAILab/Resources/AppleModels
        type: folder
        buildPhase: resources
      - CoreAILabCore
    dependencies:
      - package: coreai-models
        product: CoreAIObjectDetection
      - package: coreai-models
        product: CoreAISegmentation
      - package: coreai-models
        product: CoreAILM
      - package: coreai-models
        product: CoreAIDiffusion
      - package: swift-transformers
        product: Transformers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrank.CoreAILab
        PRODUCT_NAME: CoreAILab
        INFOPLIST_KEY_CFBundleDisplayName: Core AI Lab
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: Core AI Lab
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets:
        - CoreAILabTests
  CoreAILabMac:
    type: application
    platform: macOS
    productName: CoreAILab
    sources:
      - path: CoreAILab
        excludes:
          - Resources
      - CoreAILabCore
      - path: CoreAILab/Resources/AppleModels
        type: folder
        buildPhase: resources
      - path: CoreAILab/Resources/Chatterbox
        type: folder
        buildPhase: resources
    dependencies:
      - package: coreai-models
        product: CoreAIObjectDetection
      - package: coreai-models
        product: CoreAISegmentation
      - package: coreai-models
        product: CoreAILM
      - package: coreai-models
        product: CoreAIDiffusion
      - package: swift-transformers
        product: Transformers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrank.CoreAILabMac
        PRODUCT_NAME: CoreAILab
        INFOPLIST_KEY_CFBundleDisplayName: Core AI Lab
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: Core AI Lab
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
  CoreAILabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CoreAILabTests
    dependencies:
      - target: CoreAILab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrank.CoreAILabTests
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
  CoreAILabMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CoreAILabTests
    dependencies:
      - target: CoreAILabMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rudrank.CoreAILabMacTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CoreAILab.app/Contents/MacOS/CoreAILab"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
